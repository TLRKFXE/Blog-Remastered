<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/Cover.png" type="image/svg+xml" />
    <title>TLRK</title>
    <script>
      (function () {
        const saved = localStorage.getItem("vueuse-color-scheme");
        if (!saved) localStorage.setItem("vueuse-color-scheme", "dark");

        const next = localStorage.getItem("vueuse-color-scheme");
        if (next !== "light") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
